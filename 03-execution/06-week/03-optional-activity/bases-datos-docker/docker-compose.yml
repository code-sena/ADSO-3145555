
services:
  # 🐬 MySQL
  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 🐘 PostgreSQL
  postgres:
    image: postgres:latest
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🧱 SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_container
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Root1234!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  # 🍃 MongoDB
  mongo:
    image: mongo:latest
    container_name: mongo_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

      
# 🚀 Liquibase (Configuración Multibase)
  liquibase:
    image: liquibase/liquibase:latest
    volumes:
      # Mapeamos tu carpeta 'liquibase' de Windows a '/liquibase/workspace' en el contenedor
      - ./liquibase:/liquibase/workspace
    command: >
      --defaults-file=/liquibase/workspace/${DB_PROPS:-liquibase.properties}
      --search-path=/liquibase/workspace
      update
    depends_on:
      - postgres

volumes:
  mysql_data:
  postgres_data:
  sqlserver_data:
  mongo_data: